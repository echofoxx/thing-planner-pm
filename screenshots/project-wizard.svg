<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <rect width="1280" height="720" fill="#eff6ff"/>
  <rect x="290" y="70" width="700" height="580" rx="30" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="350" y="140" font-family="Arial" font-size="36" font-weight="700" fill="#0f172a">New Project Wizard</text>
  <text x="350" y="180" font-family="Arial" font-size="18" fill="#64748b">Pick a project type and generate phases, milestones, tasks, risks, and workflow.</text>
  <g font-family="Arial" font-size="18">
    <text x="350" y="245" fill="#111827" font-weight="700">Project Type</text>
    <rect x="350" y="265" width="580" height="54" rx="12" fill="#f8fafc" stroke="#cbd5e1"/><text x="375" y="300" fill="#334155">Software Application</text>
    <text x="350" y="360" fill="#111827" font-weight="700">Complexity</text>
    <rect x="350" y="380" width="170" height="46" rx="23" fill="#dbeafe" stroke="#60a5fa"/><text x="395" y="410" fill="#1d4ed8">Simple</text>
    <rect x="550" y="380" width="170" height="46" rx="23" fill="#f8fafc" stroke="#cbd5e1"/><text x="595" y="410" fill="#334155">Moderate</text>
    <rect x="750" y="380" width="170" height="46" rx="23" fill="#f8fafc" stroke="#cbd5e1"/><text x="800" y="410" fill="#334155">Complex</text>
    <text x="350" y="485" fill="#111827" font-weight="700">AI Starter</text>
    <rect x="350" y="505" width="580" height="76" rx="14" fill="#f8fafc" stroke="#cbd5e1"/><text x="375" y="538" fill="#334155">Generate starter WBS, risks, and first status report.</text>
  </g>
</svg>
